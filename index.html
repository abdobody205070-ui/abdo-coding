
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abdo Coding Pro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- LOGIN -->
<section id="loginPage" class="login">
  <div class="login-card">
    <h1>Abdo Coding 🚀</h1>
    <p>منصة تعلم البرمجة</p>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">تسجيل الدخول</button>
    <button onclick="register()" class="secondary">إنشاء حساب</button>
  </div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hidden">

  <header class="nav">
    <h2>Abdo Coding</h2>
    <div>
      <button onclick="openProfile()">Profile</button>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <div id="profileBox" class="profile hidden">
    <h3>👤 Profile</h3>
    <p id="userEmail"></p>
    <p>Progress: <span id="progress">0%</span></p>
  </div>

  <div class="container">
    <h3>📚 Courses</h3>

    <div class="grid">
      <div class="course" onclick="openCourse('html')">HTML</div>
      <div class="course" onclick="openCourse('css')">CSS</div>
      <div class="course" onclick="openCourse('js')">JavaScript</div>
    </div>

    <div id="courseView" class="course-view hidden">
      <h2 id="courseTitle"></h2>
      <iframe id="videoPlayer" width="100%" height="400" allowfullscreen></iframe>
      <button onclick="completeLesson()">✔ تم الانتهاء</button>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
